{% extends 'base.html' %}
{% load static %}

{% block title %}
  Login
{% endblock %}

{% block content %}
  {% block extra_css %}
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link href="{% static 'css/signup.css' %}" rel="stylesheet" />
  {% endblock %}

  <div class="container d-flex justify-content-center" style="height: 68vh;">
    <div class="wrapper mt-3">

      <div class="card">

        <!-- Global Error -->
        {% if error %}
          <ul class="global-errors">
            <li>{{ error }}</li>
          </ul>
        {% endif %}

        <form method="POST" novalidate>
          {% csrf_token %}

          <!-- Username -->
          <div class="field">
            <label>Username</label>
            <div class="input-wrap">
              <input type="text" name="username" class="form-input no-eye" placeholder="Enter your username" required />
              <svg class="icon-left" viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4" />
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
              </svg>
            </div>
          </div>

          <!-- Password -->
          <div class="field">
            <label>Password</label>
            <div class="input-wrap">
              <input type="password" name="password" id="loginPassword" class="form-input" placeholder="Enter your password" required />

              <svg class="icon-left" viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" />
                <path d="M7 11V7a5 5 0 0110 0v4" />
              </svg>

              <!-- Eye Button -->
              <button type="button" class="eye-btn" data-target="loginPassword">
                <svg class="eye-show" viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg class="eye-hide" viewBox="0 0 24 24" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94" />
                  <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-submit">Login →</button>
        </form>
      </div>

      <!-- Footer -->
      <p class="footer-link">
        Don’t have an account? <a href="{% url 'signup' %}">Sign up</a>
      </p>

    </div>
  </div>

  {% block extra_js %}
    <script src="{% static 'js/signup.js' %}"></script>
  {% endblock %}

{% endblock %}
